# Auto-deploy dashboard to Deno Deploy on push to main.
#
# One-time setup:
#   - dash.deno.com → New project (name must match DENO_PROJECT below)
#   - dash.deno.com → Account → Access tokens → New token
#   - GitHub repo Settings → Secrets → Actions → New: DENO_DEPLOY_TOKEN
#   - Deno Deploy project → Settings → Env vars → API_URL=https://inplicit-backend.fly.dev

name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: false

env:
  DENO_PROJECT: inplicit-dashboard

jobs:
  deploy:
    name: Deploy → Deno Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Build Fresh assets
        run: deno task build

      - name: Deploy
        uses: denoland/deployctl@v1
        with:
          project: ${{ env.DENO_PROJECT }}
          entrypoint: main.ts
          include: |
            _fresh
            static
            islands
            routes
            components
            lib
            main.ts
            fresh.gen.ts
            fresh.config.ts
            tailwind.config.ts
            deno.json
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
