# Fly.io config for the Inplicit dashboard (Deno Fresh).
#
# First-time setup (from inplicit-dashboard/):
#   1. flyctl auth login
#   2. flyctl apps create inplicit-app           # or whatever name; must be unique
#   3. Edit `app = "..."` below to match
#   4. flyctl secrets set API_URL=https://inplicit-api.fly.dev
#   5. flyctl deploy
#
# Subsequent deploys: `flyctl deploy`.

app = "inplicit-app"            # ← rename me on first launch
primary_region = "fra"          # Frankfurt — EU residency

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # No in-process worker — machines can sleep when idle to save cost.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/admin/login"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
